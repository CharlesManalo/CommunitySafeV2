<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback - Infrastructure Reporting</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/forms.css') }}"
    />
  </head>
  <body>
    <!-- Main Content -->
    <div class="container">
      <div class="report-form">
        <div class="login-form">
          <h2>💬 Feedback</h2>

          {% with messages = get_flashed_messages(with_categories=true) %} {% if
          messages %} {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
          {% endfor %} {% endif %} {% endwith %}

          <form method="POST">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" required />
            </div>

            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required />
            </div>

            <div class="form-group">
              <label for="user_type">User Type</label>
              <select id="user_type" name="user_type" required>
                <option value="">Select user type</option>
                <option value="student">Student</option>
                <option value="teacher">Teacher</option>
                <option value="staff">Staff</option>
                <option value="parent">Parent</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div class="form-group">
              <label for="category">Category</label>
              <select id="category" name="category" required>
                <option value="">Select category</option>
                <option value="bug">Bug Report</option>
                <option value="feature">Feature Request</option>
                <option value="improvement">Improvement Suggestion</option>
                <option value="complaint">Complaint</option>
                <option value="compliment">Compliment</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div class="form-group">
              <label for="message">Message</label>
              <textarea
                id="message"
                name="message"
                rows="5"
                required
                placeholder="Please provide your feedback..."
              ></textarea>
            </div>

            <button type="submit" class="btn btn-submit">
              Submit Feedback
            </button>
          </form>
        </div>
      </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <a href="{{ url_for('index') }}" class="nav-item">
        <img
          src="{{ url_for('static', filename='images/icons/report.png') }}"
          alt="Report"
          class="nav-icon"
        />
        <span class="nav-text">Report</span>
      </a>
      <a href="{{ url_for('history') }}" class="nav-item">
        <img
          src="{{ url_for('static', filename='images/icons/history.png') }}"
          alt="History"
          class="nav-icon"
        />
        <span class="nav-text">History</span>
      </a>
      <a href="{{ url_for('admin_login') }}" class="nav-item">
        <img
          src="{{ url_for('static', filename='images/icons/admin.png') }}"
          alt="Admin"
          class="nav-icon"
        />
        <span class="nav-text">Admin</span>
      </a>
      <a href="{{ url_for('feedback') }}" class="nav-item active">
        <img
          src="{{ url_for('static', filename='images/icons/user.png') }}"
          alt="Feedback"
          class="nav-icon"
        />
        <span class="nav-text">Feedback</span>
      </a>
    </nav>

    <script>
      // No navigation script needed since we're using regular links
    </script>
  </body>
</html>
