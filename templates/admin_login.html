<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/forms.css') }}"
    />
  </head>
  <body>
    <!-- Main Content -->
    <div class="container">
      <div class="report-form">
        <h2>🔐 Admin Login</h2>

        <form method="POST" action="{{ url_for('admin_login') }}">
          <div class="form-group">
            <label for="username">Username</label>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Enter your username"
              required
              autocomplete="username"
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              required
              autocomplete="current-password"
            />
          </div>

          <button type="submit" class="btn btn-primary btn-lg">🔐 Login</button>
        </form>

        <!-- Login Info -->
        <div class="login-info">
          <h3>Default Credentials</h3>
          <p><strong>Username:</strong> admin</p>
          <p><strong>Password:</strong> admin123</p>
          <p class="text-warning">⚠️ Change these credentials in production</p>
        </div>
      </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <a href="{{ url_for('index') }}" class="nav-item">
        <img
          src="{{ url_for('static', filename='images/icons/report.png') }}"
          alt="Report"
          class="nav-icon"
        />
        <span class="nav-text">Report</span>
      </a>
      <a href="{{ url_for('history') }}" class="nav-item">
        <img
          src="{{ url_for('static', filename='images/icons/history.png') }}"
          alt="History"
          class="nav-icon"
        />
        <span class="nav-text">History</span>
      </a>
      <a href="{{ url_for('admin_login') }}" class="nav-item active">
        <img
          src="{{ url_for('static', filename='images/icons/admin.png') }}"
          alt="Admin"
          class="nav-icon"
        />
        <span class="nav-text">Admin</span>
      </a>
      <a href="{{ url_for('feedback') }}" class="nav-item">
        <img
          src="{{ url_for('static', filename='images/icons/user.png') }}"
          alt="Feedback"
          class="nav-icon"
        />
        <span class="nav-text">Feedback</span>
      </a>
    </nav>

    <script>
      // Auto-focus on username field
      document.addEventListener("DOMContentLoaded", function () {
        document.getElementById("username").focus();
      });

      // Handle Enter key submission
      document.addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          document.querySelector("form").submit();
        }
      });
    </script>
  </body>
</html>
