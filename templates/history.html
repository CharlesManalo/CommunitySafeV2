<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Report History - Infrastructure Reporting</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <!-- Main Content -->
    <div class="container">
      <div class="report-form">
        <div class="form-group">
          <h2>📋 Report History</h2>
          <select id="status-filter" onchange="filterReports()">
            <option value="all">All Reports</option>
            <option value="Pending">Pending Only</option>
            <option value="Resolved">Resolved Only</option>
          </select>
        </div>

        <div id="reports-list">
          <!-- Reports will be loaded here -->
        </div>
      </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <a href="{{ url_for('index') }}" class="nav-item">
        <img
          src="{{ url_for('static', filename='images/icons/report.png') }}"
          alt="Report"
          class="nav-icon"
        />
        <span class="nav-text">Report</span>
      </a>
      <a href="{{ url_for('history') }}" class="nav-item active">
        <img
          src="{{ url_for('static', filename='images/icons/history.png') }}"
          alt="History"
          class="nav-icon"
        />
        <span class="nav-text">History</span>
      </a>
      <a href="{{ url_for('admin_login') }}" class="nav-item">
        <img
          src="{{ url_for('static', filename='images/icons/admin.png') }}"
          alt="Admin"
          class="nav-icon"
        />
        <span class="nav-text">Admin</span>
      </a>
      <a href="{{ url_for('feedback') }}" class="nav-item">
        <img
          src="{{ url_for('static', filename='images/icons/user.png') }}"
          alt="Feedback"
          class="nav-icon"
        />
        <span class="nav-text">Feedback</span>
      </a>
    </nav>

    <script>
      let allReports = [];

      // Load Reports
      function loadReports() {
        fetch("/api/reports")
          .then((response) => response.json())
          .then((data) => {
            if (data.success) {
              allReports = data.reports;
              displayReports(allReports);
            } else {
              alert("Error loading reports: " + data.error);
            }
          })
          .catch((error) => {
            console.error("Error:", error);
            alert("Error loading reports. Please try again.");
          });
      }

      // Display Reports
      function displayReports(reports) {
        const container = document.getElementById("reports-list");
        const statusFilter = document.getElementById("status-filter").value;

        const filteredReports =
          statusFilter === "all"
            ? reports
            : reports.filter((report) => report.status === statusFilter);

        if (filteredReports.length === 0) {
          container.innerHTML =
            '<p style="text-align: center; color: #666;">No reports found.</p>';
          return;
        }

        container.innerHTML = filteredReports
          .map(
            (report) => `
          <div class="report-card">
            <div class="report-header">
              <div class="report-id">
                <h3>Report #${report.id}</h3>
                <span class="status-badge status-${report.status.toLowerCase()}">${report.status}</span>
              </div>
              <div class="report-date">${report.date_reported}</div>
            </div>
            <div class="report-description">
              <p>${report.description}</p>
            </div>
            
            <div class="report-images">
              ${
                report.before_image
                  ? `
                <div class="image-container">
                  <h4>Before</h4>
                  <img
                    src="/static/uploads/before/${report.before_image}"
                    alt="Hazard before resolution"
                    class="hazard-image"
                    onclick="window.open(this.src, '_blank')"
                    style="cursor: pointer"
                  />
                </div>
              `
                  : ""
              }
              
              ${
                report.after_image
                  ? `
                <div class="image-container">
                  <h4>After</h4>
                  <img
                    src="/static/uploads/after/${report.after_image}"
                    alt="Hazard after resolution"
                    class="hazard-image"
                    onclick="window.open(this.src, '_blank')"
                    style="cursor: pointer"
                  />
                </div>
              `
                  : ""
              }
              
              ${
                report.status === "Pending"
                  ? `
                <div class="image-container">
                  <h4>⏳ Pending</h4>
                  <div style="width: 100%; height: 250px; background: #f8f9fa; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #6c757d; font-weight: 500;">
                    <p>Resolution in progress</p>
                  </div>
                </div>
              `
                  : ""
              }
            </div>
            
            <div class="report-location">
              <p>
                <strong>Location:</strong> ${report.latitude.toFixed(6)}, ${report.longitude.toFixed(
                  6,
                )}
              </p>
              <button
                class="btn btn-secondary"
                onclick="window.open('https://www.google.com/maps/search/?api=1&query=${report.latitude},${report.longitude}', '_blank')"
              >
                🗺️ Open in Google Maps
              </button>
            </div>
            
            ${
              report.date_resolved
                ? `
              <div class="report-date">
                <p><strong>✅ Resolved:</strong> ${report.date_resolved}</p>
              </div>
            `
                : ""
            }
          </div>
        `,
          )
          .join("");
      }

      // Filter Reports
      function filterReports() {
        displayReports(allReports);
      }

      // Load reports on page load
      document.addEventListener("DOMContentLoaded", loadReports);
    </script>
  </body>
</html>
